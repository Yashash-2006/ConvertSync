kind = "web"
previewPath = "/"
title = "Word ↔ PDF Converter"
version = "1.0.0"
id = "artifacts/converter"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24751

[services.development]
run = "pnpm --filter @workspace/converter run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/converter", "run", "build" ]
publicDir = "artifacts/converter/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24751"
BASE_PATH = "/"
