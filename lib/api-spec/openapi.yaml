openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Word ↔ PDF Converter API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: conversions
    description: File conversion operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /conversions:
    get:
      operationId: listConversions
      tags: [conversions]
      summary: List all conversions
      description: Returns conversion history ordered newest first
      responses:
        "200":
          description: List of conversions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversion"
    post:
      operationId: createConversion
      tags: [conversions]
      summary: Upload and convert a file
      description: Upload a .docx or .pdf file and convert it to the target format
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ConversionInput"
      responses:
        "201":
          description: Conversion created and completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversion"
        "400":
          description: Invalid file or format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /conversions/stats:
    get:
      operationId: getConversionStats
      tags: [conversions]
      summary: Get conversion statistics
      description: Returns aggregate stats about all conversions
      responses:
        "200":
          description: Conversion statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversionStats"

  /conversions/{id}:
    get:
      operationId: getConversion
      tags: [conversions]
      summary: Get a single conversion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversion record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversion"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteConversion
      tags: [conversions]
      summary: Delete a conversion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdf:
    get:
      operationId: listPdfOperations
      tags: [pdf]
      summary: List all PDF operations
      responses:
        "200":
          description: List of PDF operations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PdfOperation"

  /pdf/merge:
    post:
      operationId: mergePdfs
      tags: [pdf]
      summary: Merge multiple PDFs into one
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/MergePdfInput"
      responses:
        "201":
          description: Merged PDF operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfOperation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdf/split:
    post:
      operationId: splitPdf
      tags: [pdf]
      summary: Split a PDF into individual pages (returned as ZIP)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/SplitPdfInput"
      responses:
        "201":
          description: Split PDF operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfOperation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdf/compress:
    post:
      operationId: compressPdf
      tags: [pdf]
      summary: Compress a PDF file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CompressPdfInput"
      responses:
        "201":
          description: Compress PDF operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfOperation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdf/protect:
    post:
      operationId: protectPdf
      tags: [pdf]
      summary: Password-protect a PDF file
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/ProtectPdfInput"
      responses:
        "201":
          description: Protect PDF operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfOperation"
        "400":
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /pdf/{id}:
    get:
      operationId: getPdfOperation
      tags: [pdf]
      summary: Get a single PDF operation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PDF operation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PdfOperation"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePdfOperation
      tags: [pdf]
      summary: Delete a PDF operation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: File not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content streamed.
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ConversionInput:
      type: object
      required: [file, targetFormat]
      properties:
        file:
          type: string
          format: binary
          description: The file to convert (.docx or .pdf)
        targetFormat:
          type: string
          enum: [pdf, docx]
          description: Target output format

    Conversion:
      type: object
      required: [id, originalFilename, originalFormat, targetFormat, status, fileSizeBytes, createdAt]
      properties:
        id:
          type: integer
        originalFilename:
          type: string
        originalFormat:
          type: string
        targetFormat:
          type: string
        status:
          type: string
          enum: [pending, completed, failed]
        errorMessage:
          type: ["string", "null"]
        fileSizeBytes:
          type: integer
        convertedFileSizeBytes:
          type: ["integer", "null"]
        cloudObjectPath:
          type: ["string", "null"]
          description: GCS object path when file is stored in cloud
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time

    ConversionStats:
      type: object
      required: [totalConversions, successCount, failureCount, docxToPdfCount, pdfToDocxCount, totalBytesProcessed]
      properties:
        totalConversions:
          type: integer
        successCount:
          type: integer
        failureCount:
          type: integer
        docxToPdfCount:
          type: integer
        pdfToDocxCount:
          type: integer
        totalBytesProcessed:
          type: integer

    PdfOperation:
      type: object
      required: [id, operationType, status, originalFilenames, createdAt]
      properties:
        id:
          type: integer
        operationType:
          type: string
          enum: [merge, split, compress, protect]
        status:
          type: string
          enum: [pending, completed, failed]
        errorMessage:
          type: ["string", "null"]
        originalFilenames:
          type: array
          items:
            type: string
        resultFilename:
          type: ["string", "null"]
        fileSizeBytes:
          type: ["integer", "null"]
        resultFileSizeBytes:
          type: ["integer", "null"]
        cloudObjectPath:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: ["string", "null"]
          format: date-time

    MergePdfInput:
      type: object
      required: [files]
      properties:
        files:
          type: array
          items:
            type: string
            format: binary
          description: Two or more PDF files to merge

    SplitPdfInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: PDF file to split
        pageRanges:
          type: string
          description: "Comma-separated page ranges e.g. '1-3,4-6,7'. Leave empty to split into individual pages."

    CompressPdfInput:
      type: object
      required: [file]
      properties:
        file:
          type: string
          format: binary
          description: PDF file to compress
        level:
          type: string
          enum: [low, medium, high]
          description: "Compression level: low (smallest), medium (balanced), high (best quality)"

    ProtectPdfInput:
      type: object
      required: [file, password]
      properties:
        file:
          type: string
          format: binary
          description: PDF file to protect
        password:
          type: string
          minLength: 1
          description: Password to set on the PDF

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
